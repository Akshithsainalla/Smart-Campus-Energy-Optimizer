spring.application.name=sceo-backend

# Render provides a dynamic PORT env var; default to 8080 for local dev
server.port=${PORT:8080}

# H2 In-Memory Database (no file I/O – works on Render's ephemeral filesystem)
spring.datasource.url=jdbc:h2:mem:sceodb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console disabled in production (enable locally if needed)
spring.h2.console.enabled=false

# CORS — set CORS_ALLOWED_ORIGIN env var to your Render frontend URL in production
# Default allows local Vite dev server
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Jackson — serialize/deserialize Java 8 LocalDate as ISO-8601 string ("2026-03-18")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
