spring.application.name=demo
server.port=8080

# H2 File-Based Database — data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/sceodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (optional, for debugging: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Jackson — serialize/deserialize Java 8 LocalDate as ISO-8601 string ("2026-03-18")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
