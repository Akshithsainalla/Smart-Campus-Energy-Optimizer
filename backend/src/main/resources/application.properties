spring.application.name=sceo-backend

# Render provides a dynamic PORT env var; default to 8080 for local dev
server.port=${PORT:8080}

# ── Aiven MySQL Database ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGIN to your frontend URL in production
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ── Jackson ───────────────────────────────────────────────────────────────────
# Serialize Java 8 LocalDate as ISO-8601 string ("2026-03-18")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
